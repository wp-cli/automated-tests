name: Testing

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:
  schedule:
    - cron:  '0 0 * * *' # Run every day at midnight.

jobs:

  functional:
    strategy:
      fail-fast: false
      matrix:
        test-package:
          - wp-cli-bundle
          - wp-cli
          - ability-command
          - block-command
          - cache-command
          - checksum-command
          - config-command
          - core-command
          - cron-command
          - db-command
          - embed-command
          - entity-command
          - eval-command
          - export-command
          - extension-command
          - i18n-command
          - import-command
          - language-command
          - maintenance-mode-command
          - media-command
          - package-command
          - rewrite-command
          - role-command
          - scaffold-command
          - search-replace-command
          - server-command
          - shell-command
          - site-health-command
          - super-admin-command
          - widget-command

    uses: ./.github/workflows/callable-test.yml
    with:
      test-package: ${{ matrix.test-package }}

