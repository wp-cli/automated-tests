name: Testing

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:
  schedule:
    - cron:  '0 0 * * *' # Run every day at midnight.

jobs:

  functional:
    name: ${{ matrix.test-package }}
    strategy:
      fail-fast: false
      matrix:
        php: ['7.2', '8.5']
        wp: ['latest', 'trunk']
        dbtype: ['mysql', 'sqlite', 'mariadb']
        object_cache: ['none', 'sqlite']
        use-phar: [false, true]
        os: ['ubuntu-22.04', 'macos-latest', 'windows-latest']
        test-package:
          - wp-cli-bundle
          - wp-cli
          - ability-command
          - ai-command
          - block-command
          - cache-command
          - checksum-command
          - config-command
          - core-command
          - cron-command
          - db-command
          - embed-command
          - entity-command
          - eval-command
          - export-command
          - extension-command
          - i18n-command
          - import-command
          - language-command
          - maintenance-mode-command
          - media-command
          - package-command
          - rewrite-command
          - role-command
          - scaffold-command
          - search-replace-command
          - server-command
          - shell-command
          - site-health-command
          - super-admin-command
          - widget-command
        exclude:
          # Object cache runs only on sqlite dbtype
          - dbtype: mysql
            object_cache: sqlite
            
          - dbtype: sqlite
            php: '7.2'
            
          # Object cache runs only with WP latest
          - object_cache: sqlite
            wp: trunk
            
          # A1: object_cache=sqlite only on PHP 8.5
          - php: '7.2'
            object_cache: sqlite
            
          # Phar usage match defaults 
          - use-phar: true
            wp: trunk
          - use-phar: false
            wp: latest
          - use-phar: true
            php: '7.2'
            
          # Limit ancient php on trunk
          - php: '7.2'
            wp: trunk
            
          # Only run one macos combination: php: 8.5, wp: trunk, dbtype: sqlite, object_cache: none, use-phar: false
          - os: macos-latest
            php: '7.2'
          - os: macos-latest
            wp: latest
          - os: macos-latest
            dbtype: mysql
          - os: macos-latest
            object_cache: sqlite
            
          # Only run one windows combination: php: 8.5, wp: trunk, dbtype: sqlite, object_cache: none, use-phar: false
          - os: windows-latest
            php: '7.2'
          - os: windows-latest
            wp: latest
          - os: windows-latest
            dbtype: mysql
          - os: windows-latest
            object_cache: sqlite

          # Skip Windows tests for db-command to to environment configuration issues with SQLite.
          - os: windows-latest
            test-package: db-command
            
          # Limit MariaDB runs to php: 8.5, wp: trunk, os: ubuntu-22.04, object_cache: none, use-phar: false
          - dbtype: mariadb
            php: '7.2'
          - dbtype: mariadb
            wp: latest
          - dbtype: mariadb
            os: macos-latest
          - dbtype: mariadb
            os: windows-latest
          - dbtype: mariadb
            object_cache: sqlite
          - dbtype: mariadb
            use-phar: true



    uses: ./.github/workflows/reusable-testing.yml
    with:
      test-package: ${{ matrix.test-package }}
      php: ${{ matrix.php }}
      wp: ${{ matrix.wp }}
      dbtype: ${{ matrix.dbtype }}
      object_cache: ${{ matrix.object_cache }}
      use-phar: ${{ matrix.use-phar }}
      os: ${{ matrix.os }}
      mysql: ${{ matrix.dbtype == 'mariadb' && 'mariadb-10.11' || 'mysql-8.0' }}

